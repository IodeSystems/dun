<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>dun</title>
<style>
  :root {
    --bg:#0d0f12; --fg:#d7dae0; --dim:#7a828e; --acc:#d75fd7; --user:#4aa8ff;
    --tool:#3fd07a; --err:#ff5f5f; --note:#e0a53f; --line:#20242b; --panel:#14171c;
  }
  * { box-sizing:border-box; }
  html,body { margin:0; height:100%; background:var(--bg); color:var(--fg);
    font:14px/1.5 ui-monospace,SFMono-Regular,Menlo,Consolas,monospace; }
  body { display:flex; flex-direction:column; }
  header { padding:.5rem .75rem; border-bottom:1px solid var(--line);
    display:flex; gap:.75rem; align-items:baseline; color:var(--dim); flex-wrap:wrap; }
  header .b { color:var(--acc); font-weight:700; }
  #log { flex:1; overflow-y:auto; padding:.75rem; }
  .msg { white-space:pre-wrap; word-break:break-word; margin:.35rem 0; }
  .user { color:var(--user); font-weight:600; }
  .asst { color:var(--fg); }
  .note { color:var(--note); }
  .err  { color:var(--err); }
  .dim  { color:var(--dim); }
  details.tool { border:1px solid var(--line); border-radius:6px; margin:.4rem 0;
    background:var(--panel); }
  details.tool > summary { cursor:pointer; padding:.35rem .55rem; color:var(--tool);
    list-style:none; }
  details.tool > summary::-webkit-details-marker { display:none; }
  details.tool > summary::before { content:"▸ "; color:var(--dim); }
  details.tool[open] > summary::before { content:"▾ "; }
  .io { padding:.3rem .55rem .55rem; }
  .io h4 { margin:.5rem 0 .2rem; color:var(--dim); font-weight:600; font-size:.8rem;
    text-transform:uppercase; letter-spacing:.05em; }
  .io pre { margin:0; max-height:60vh; overflow:auto; white-space:pre-wrap;
    word-break:break-word; background:#0b0d10; border:1px solid var(--line);
    border-radius:4px; padding:.4rem .5rem; }
  form.ask { border:1px solid var(--acc); border-radius:6px; padding:.6rem .7rem;
    margin:.5rem 0; background:var(--panel); }
  form.ask .q { color:var(--acc); font-weight:700; margin-bottom:.4rem; }
  form.ask label { display:block; padding:.15rem 0; cursor:pointer; }
  form.ask input[type=text] { width:100%; margin-top:.4rem; background:#0b0d10;
    color:var(--fg); border:1px solid var(--line); border-radius:4px; padding:.4rem; font:inherit; }
  form.ask button { margin-top:.5rem; background:var(--acc); color:#111; border:0;
    border-radius:4px; padding:.35rem .8rem; font:inherit; font-weight:700; cursor:pointer; }
  #composer { display:flex; gap:.5rem; padding:.5rem .75rem; border-top:1px solid var(--line); }
  #composer textarea { flex:1; resize:none; height:2.4rem; background:var(--panel);
    color:var(--fg); border:1px solid var(--line); border-radius:6px; padding:.45rem .6rem; font:inherit; }
  #composer button { background:var(--user); color:#04121f; border:0; border-radius:6px;
    padding:0 1rem; font:inherit; font-weight:700; cursor:pointer; }
  #composer button:disabled { opacity:.4; cursor:default; }
  #status { color:var(--dim); padding:0 .75rem .5rem; min-height:1.2em; }
</style>
</head>
<body>
  <header>
    <span class="b">dun</span>
    <span id="ws" class="dim"></span>
    <span id="branch" class="dim"></span>
    <span id="tools" class="dim"></span>
    <a href="/term" class="dim" style="margin-left:auto; color:var(--user); text-decoration:none">⌁ terminal view</a>
    <span id="usage" class="dim"></span>
  </header>
  <div id="log"></div>
  <div id="status"></div>
  <div id="composer">
    <textarea id="in" placeholder="ask dun to do something…  (enter to send, shift+enter for newline)"></textarea>
    <button id="send">send</button>
  </div>

<script>
const log = document.getElementById('log');
const statusEl = document.getElementById('status');
const inputEl = document.getElementById('in');
const sendBtn = document.getElementById('send');

let live = null;      // the streaming assistant element (tokens append here)
let pending = null;   // args of the last tool_call, consumed by tool_result
let askEl = null;     // the active ask form, if any
let busy = false;

const atBottom = () => log.scrollHeight - log.scrollTop - log.clientHeight < 40;
function add(el){ const stick = atBottom(); log.appendChild(el); if (stick) log.scrollTop = log.scrollHeight; return el; }
function line(cls, text){ const d = document.createElement('div'); d.className = 'msg '+cls; d.textContent = text; return add(d); }
function esc(s){ return (s==null?'':String(s)); }

function argPreview(args){
  if(!args) return '';
  return Object.keys(args).sort().map(k => k+'='+clip(oneLine(String(args[k])),48)).join(', ');
}
function oneLine(s){ return s.replace(/\s+/g,' ').trim(); }
function clip(s,n){ return s.length>n ? s.slice(0,n-1)+'…' : s; }
function argFull(args){
  if(!args||!Object.keys(args).length) return '(no input)';
  return Object.keys(args).sort().map(k => k+': '+esc(args[k])).join('\n');
}

function setBusy(b){
  busy = b;
  sendBtn.disabled = b;
  statusEl.textContent = b ? 'working…' : '';
}

// Any forward progress supersedes an unanswered ask form (also handles history
// replay, where the ask is followed by its answer's tool_result).
function clearAsk(){ if(askEl){ askEl.remove(); askEl = null; inputEl.disabled = false; } }

function handle(ev){
  switch(ev.type){
    case 'ready':
      document.getElementById('tools').textContent =
        '· '+(ev.tools||[]).length+' tools: '+(ev.tools||[]).join(', ');
      break;
    case 'workspace':
      document.getElementById('branch').textContent = ev.branch ? '⎇ '+ev.branch : '';
      break;
    case 'session':
      if(ev.resumed) line('dim', 'resumed session '+esc(ev.id)+' ('+ev.resumed+' entries)');
      break;
    case 'token':
      clearAsk(); setBusy(true);
      if(!live){ live = line('asst',''); }
      live.textContent += ev.text;
      if(atBottom()) log.scrollTop = log.scrollHeight;
      break;
    case 'message':
      live = null; // finalize; tokens already rendered it
      break;
    case 'tool_call':
      clearAsk(); setBusy(true); live = null;
      pending = ev.args || {};
      break;
    case 'tool_result': {
      const t = document.createElement('details'); t.className = 'tool';
      const sum = document.createElement('summary');
      sum.textContent = '⚙ '+esc(ev.tool)+'('+argPreview(pending)+')';
      const io = document.createElement('div'); io.className = 'io';
      const hi = document.createElement('h4'); hi.textContent = 'input';
      const pi = document.createElement('pre'); pi.textContent = argFull(pending);
      const ho = document.createElement('h4'); ho.textContent = 'output';
      const po = document.createElement('pre'); po.textContent = esc(ev.result) || '(no output)';
      io.append(hi,pi,ho,po); t.append(sum,io); add(t);
      pending = null;
      break;
    }
    case 'notification':
      if(ev.kind === 'docs'){
        line('note', '🔎 '+ev.found+' relevant doc(s) · '+ev.surfaced+' surfaced');
      } else {
        line('note', '🔔 '+oneLine(esc(ev.text)));
      }
      break;
    case 'ask':
      renderAsk(ev);
      break;
    case 'usage':
      document.getElementById('usage').textContent =
        'tokens: '+(ev.total||0)+' (active '+(ev.active||0)+')';
      break;
    case 'done':
      live = null; setBusy(false);
      break;
    case 'error':
      line('err', 'error: '+esc(ev.error)); setBusy(false);
      break;
    case 'eof':
      line('err', 'engine exited'); setBusy(false); sendBtn.disabled = true;
      break;
  }
}

function renderAsk(ev){
  clearAsk();
  setBusy(false);
  inputEl.disabled = true;
  const opts = ev.options || [];
  const multi = !!ev.multi;
  const f = document.createElement('form'); f.className = 'ask';
  const q = document.createElement('div'); q.className = 'q';
  q.textContent = '❓ '+esc(ev.question); f.append(q);

  opts.forEach((o,i) => {
    const lab = document.createElement('label');
    const inp = document.createElement('input');
    inp.type = multi ? 'checkbox' : 'radio';
    inp.name = 'opt'; inp.value = o; if(!multi && i===0) inp.checked = true;
    lab.append(inp, document.createTextNode(' '+o));
    f.append(lab);
  });

  const custom = document.createElement('input');
  custom.type = 'text';
  custom.placeholder = opts.length ? 'or type a custom answer…' : 'type your answer…';
  f.append(custom);

  const btn = document.createElement('button'); btn.textContent = 'answer'; f.append(btn);
  f.onsubmit = e => {
    e.preventDefault();
    let val = custom.value.trim();
    if(!val){
      const chosen = [...f.querySelectorAll('input[name=opt]:checked')].map(x => x.value);
      val = chosen.join(', ');
    }
    if(!val) return;
    line('user', '› '+val);
    post({type:'answer', value:val});
    clearAsk();
    setBusy(true);
  };
  askEl = add(f);
  custom.focus();
}

function post(obj){
  fetch('/input', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(obj)})
    .catch(err => line('err','send failed: '+err));
}

function sendUser(){
  const v = inputEl.value.trim();
  if(!v || busy || inputEl.disabled) return;
  line('user', '› '+v);
  inputEl.value = '';
  post({type:'user', content:v});
  setBusy(true);
}
sendBtn.onclick = sendUser;
inputEl.addEventListener('keydown', e => {
  if(e.key === 'Enter' && !e.shiftKey){ e.preventDefault(); sendUser(); }
});

const es = new EventSource('/events');
es.onmessage = e => { try { handle(JSON.parse(e.data)); } catch(err){ console.error(err, e.data); } };
es.onerror = () => { statusEl.textContent = 'reconnecting…'; };
</script>
</body>
</html>
