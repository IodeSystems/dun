<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>dun · terminal</title>
<link rel="stylesheet" href="/static/xterm.min.css">
<style>
  html,body { margin:0; height:100%; background:#0d0f12; }
  #term { position:absolute; inset:0; padding:6px 8px; }
  .bar { position:fixed; top:6px; right:12px; z-index:10;
    font:12px ui-monospace,Menlo,Consolas,monospace; color:#7a828e; }
  .bar a { color:#4aa8ff; text-decoration:none; }
</style>
</head>
<body>
  <div class="bar"><a href="/">← web view (option A)</a> · xterm (option B)</div>
  <div id="term"></div>
  <script src="/static/xterm.js"></script>
  <script src="/static/addon-fit.js"></script>
  <script>
    const term = new Terminal({
      fontFamily: 'ui-monospace,SFMono-Regular,Menlo,Consolas,monospace',
      fontSize: 14, cursorBlink: true,
      theme: { background: '#0d0f12', foreground: '#d7dae0' },
    });
    const fit = new FitAddon.FitAddon();
    term.loadAddon(fit);
    term.open(document.getElementById('term'));
    fit.fit();

    const proto = location.protocol === 'https:' ? 'wss' : 'ws';
    const ws = new WebSocket(proto + '://' + location.host + '/term/ws');
    ws.binaryType = 'arraybuffer';

    // resize frame: [1, colsHi, colsLo, rowsHi, rowsLo] → server pty.Setsize →
    // SIGWINCH → bubbletea reflow.
    function sendResize() {
      fit.fit();
      if (ws.readyState !== 1) return;
      const m = new Uint8Array(5);
      m[0] = 1;
      m[1] = term.cols >> 8; m[2] = term.cols & 255;
      m[3] = term.rows >> 8; m[4] = term.rows & 255;
      ws.send(m);
    }

    ws.onopen = () => { sendResize(); term.focus(); };
    ws.onmessage = e => term.write(new Uint8Array(e.data));
    ws.onclose = () => term.write('\r\n\x1b[31m[disconnected]\x1b[0m\r\n');

    // keystroke frame: [0, ...utf8]
    term.onData(d => {
      const b = new TextEncoder().encode(d);
      const m = new Uint8Array(b.length + 1);
      m[0] = 0; m.set(b, 1);
      if (ws.readyState === 1) ws.send(m);
    });

    addEventListener('resize', sendResize);
  </script>
</body>
</html>
